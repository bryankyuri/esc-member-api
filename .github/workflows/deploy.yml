name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  check:
    name: Sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: App imports and boots
        run: python -c "from app.main import app; print('app imports OK, routes registered')"

  deploy:
    name: Deploy to Lightsail
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Pull, install, restart, verify
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          script: |
            sudo -u esc bash -c '
              set -e
              cd /home/esc/member-api
              git fetch origin main
              git reset --hard origin/main
              .venv/bin/pip install -q -r requirements.txt
            '
            sudo systemctl restart member-api
            sleep 3
            curl -fsS http://127.0.0.1:8000/health
            echo "deploy OK"
